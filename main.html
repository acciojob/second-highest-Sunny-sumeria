			function secondHighest(arr) {
  // Edge case: empty or single element array
  if (arr.length <= 1) return -Infinity;

  let highest = -Infinity;
  let secondHighest = -Infinity;

  for (let i = 0; i < arr.length; i++) {
    const current = Number(arr[i]);

    if (current > highest) {
      // The previous highest moves down to second place
      secondHighest = highest;
      highest = current;
    } else if (current < highest && current > secondHighest) {
      // Current is between highest and secondHighest
      secondHighest = current;
    }
  }

  // If secondHighest is still -Infinity, it means all elements were the same
  return secondHighest;
}
