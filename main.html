<!DOCTYPE html>

<html>

<head>

<body>	
	<script>
		function secondHighest(arr) {
			//Write your code here
    // Check if the array has fewer than 2 elements
    if (arr.length < 2) {
        return -Infinity;
    }

    let highest = -Infinity;
    let secondHighest = -Infinity;

    for (let i = 0; i < arr.length; i++) {
        let current = arr[i];

        // If current element is greater than the highest
        if (current > highest) {
            secondHighest = highest;
            highest = current;
        } 
        // If current is less than highest but greater than secondHighest
        else if (current > secondHighest && current < highest) {
            secondHighest = current;
        }
    }

    // If secondHighest was never updated (e.g., all elements were the same)
    return secondHighest;
		}
		function Main() {
			var n = prompt("Enter the number of elements");
			var arr = [];
			for (var i = 0; i < n; i++) {
				arr[i] = prompt("Enter element " + (i+1));
			}
			alert(secondHighest(arr));
		}
		Main();
	</script>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
